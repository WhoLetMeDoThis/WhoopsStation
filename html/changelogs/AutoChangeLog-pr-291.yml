changes:
  - qol: "Renamed Invasive Neurological Tissue Repair to Invasive Neurological Tissue Removal. Increased the time it takes to make it easier to cancel if accidentally selected. Prevents it from being selected if there are no deep-rooted traumas."
  - balance: "Lowers the chance of a permanent trauma from 75% to 50%."
  - code_imp: "Changed edit comments for Invasive Neurological Tissue Repair to be more in line with current modularization guidelines."