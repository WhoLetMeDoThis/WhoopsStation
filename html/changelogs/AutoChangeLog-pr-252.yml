  - rscadd: "Hemophage abilities heal whatever bodytype the chest the tumor is in is instead of specifically organic bodyparts. This means an auged out vampire cant heal organic limbs but can heal robotic limbs, a plasmaman chest having hemophage (if you for some reason created one) would be able to heal golem limbs and plasmaman limbs but not robotic or organic ones, etc."